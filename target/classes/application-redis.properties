# ========================================
# Redis Configuration Profile
# Usage: mvn spring-boot:run -Dspring-boot.run.arguments="--spring.profiles.active=redis"
# ========================================

# ========================================
# JPA / Hibernate Configuration
# ========================================
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

# ========================================
# Redis Connection Configuration
# ========================================
spring.redis.host=localhost
spring.redis.port=6379
spring.redis.timeout=60000ms
spring.redis.password=

# ========================================
# Redis Lettuce Connection Pool Configuration
# ========================================
spring.redis.lettuce.pool.max-active=8
spring.redis.lettuce.pool.max-idle=8
spring.redis.lettuce.pool.min-idle=0

# ========================================
# H2 Database Configuration (In-Memory with Redis)
# ========================================
spring.datasource.url=jdbc:h2:mem:testdb
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.h2.console.enabled=true

# ========================================
# Logging Configuration
# ========================================
logging.level.root=INFO
logging.level.com.gracefulsoul=DEBUG
logging.level.org.redisson=DEBUG

# ========================================
# Server Configuration
# ========================================
server.port=8080
