# ========================================
# In-Memory Configuration Profile (Default)
# Usage: mvn spring-boot:run
# ========================================

# ========================================
# Auto-Configuration Exclusion (Spring Data Redis)
# Redis 자동설정 제외하여 in-memory에서 Redis 초기화 방지
# ========================================
spring.autoconfigure.exclude=\
  org.springframework.boot.autoconfigure.data.redis.RedisAutoConfiguration,\
  org.springframework.boot.autoconfigure.data.redis.RedisRepositoriesAutoConfiguration,\
  org.redisson.spring.starter.RedissonAutoConfigurationV2

# ========================================
# JPA / Hibernate Configuration
# ========================================
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

# ========================================
# H2 Database Configuration (In-Memory)
# ========================================
spring.datasource.url=jdbc:h2:mem:testdb
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.h2.console.enabled=true

# ========================================
# In-Memory Lock Configuration
# Uses simple ConcurrentHashMap based locking
# ========================================
app.lock.type=in-memory

# ========================================
# Logging Configuration
# ========================================
logging.level.root=INFO
logging.level.com.gracefulsoul=DEBUG

# ========================================
# Server Configuration
# ========================================
server.port=8080
